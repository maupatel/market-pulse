name: CI

on:
  pull_request:
  push:
    branches: [main]
    paths: ["pulse.py"]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pipeline dry run
        run: |
          python pulse.py
          test -s data/history.csv
          grep -q "Last run:" README.md
          echo "Pipeline produced data and refreshed README."
